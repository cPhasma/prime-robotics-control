name: Python syntax check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: |
          python -m py_compile server.py
          python -m py_compile controllers/follow_base.py
          python -m py_compile controllers/follow_car1.py
          python -m py_compile controllers/follow_car2.py
          if [ -d scripts ]; then python -m compileall scripts; fi
